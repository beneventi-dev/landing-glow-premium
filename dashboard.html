<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Lead Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard-styles.css">
</head>
<body>
    <!-- NAVBAR -->
    <div class="navbar" id="navbar" style="display: none;">
        <h1>Dashboard</h1>
        <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </div>

    <!-- LOGIN SECTION -->
    <div class="login-section" id="loginSection">
        <div class="login-card">
            <h2>Acceso al Dashboard</h2>
            <form onsubmit="login(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="login-btn">Iniciar sesión</button>
                <div class="error-message" id="errorMessage"></div>
            </form>
        </div>
    </div>

    <!-- DASHBOARD SECTION -->
    <div class="dashboard-section" id="dashboardSection">
        <div class="container">
            <!-- STATS -->
            <div class="stats">
                <div class="stat-card">
                    <h3>Total de Leads</h3>
                    <div class="number" id="totalLeads">0</div>
                </div>
                <div class="stat-card">
                    <h3>Pendientes</h3>
                    <div class="number" id="pendientesLeads">0</div>
                </div>
                <div class="stat-card">
                    <h3>Contactados</h3>
                    <div class="number" id="contactadosLeads">0</div>
                </div>
                <div class="stat-card">
                    <h3>Convertidos</h3>
                    <div class="number" id="convertidosLeads">0</div>
                </div>
            </div>

            <!-- HEADER -->
            <div class="dashboard-header">
                <h2>Gestión de Leads</h2>
                <div class="controls">
                    <input type="text" id="searchBox" class="search-box" placeholder="Buscar por nombre o email...">
                    <button class="refresh-btn" onclick="cargarLeads()">Actualizar</button>
                    <button class="export-btn" onclick="exportarCSV()">Exportar CSV</button>
                </div>
            </div>

            <!-- TABLE -->
            <div class="table-wrapper">
                <div id="loadingMessage" class="loading">Cargando leads...</div>
                <div id="emptyState" class="empty-state" style="display: none;">
                    <h3>Sin leads</h3>
                    <p>No hay leads registrados aún</p>
                </div>
                <table id="leadsTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Teléfono</th>
                            <th>Interés</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="leadsTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL DE CONTACTO -->
    <div id="contactModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="cerrarModalContacto()">×</button>
            <h3 id="modalContactoNombre">Contactar a</h3>
            <p class="modal-email" id="modalContactoEmail"></p>

            <div class="modal-actions">
                <a id="btnEmail" class="modal-btn btn-email" target="_blank">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                    </svg>
                    Correo
                </a>
                <a id="btnTelefono" class="modal-btn btn-phone" target="_blank">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                    </svg>
                    Llamar
                </a>
                <a id="btnWhatsapp" class="modal-btn btn-whatsapp" target="_blank">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                    </svg>
                    WhatsApp
                </a>
            </div>
        </div>
    </div>

    <!-- Firebase SDK v8 (compatible con scripts tradicionales) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Variables globales
        let auth;
        let database;
        let leadsData = [];
        let filteredLeads = [];

        // Obtener configuración de Firebase desde el servidor (seguro)
        async function inicializarDashboard() {
            try {
                const response = await fetch('/api/dashboard-config');
                const firebaseConfig = await response.json();

                // Inicializar Firebase con la configuración del servidor
                firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                database = firebase.database();

                // Verificar autenticación
                auth.onAuthStateChanged(user => {
                    if (user) {
                        mostrarDashboard(user);
                        cargarLeads();
                    } else {
                        mostrarLogin();
                    }
                });
            } catch (error) {
                console.error('Error al cargar configuración:', error);
                alert('Error al inicializar el dashboard. Intenta recargar la página.');
            }
        }

        // Inicializar cuando el DOM esté listo
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', inicializarDashboard);
        } else {
            inicializarDashboard();
        }

        function mostrarLogin() {
            document.getElementById('loginSection').style.display = 'flex';
            document.getElementById('dashboardSection').classList.remove('active');
            document.getElementById('navbar').style.display = 'none';
        }

        function mostrarDashboard(user) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').classList.add('active');
            document.getElementById('navbar').style.display = 'flex';
        }

        function login(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');

            auth.signInWithEmailAndPassword(email, password)
                .catch(error => {
                    errorMsg.textContent = 'Email o contraseña incorrectos';
                    console.error(error);
                });
        }

        function logout() {
            auth.signOut();
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('errorMessage').textContent = '';
        }

        function cargarLeads() {
            const loadingMsg = document.getElementById('loadingMessage');
            const emptyState = document.getElementById('emptyState');
            const table = document.getElementById('leadsTable');
            const tbody = document.getElementById('leadsTableBody');

            loadingMsg.style.display = 'block';
            table.style.display = 'none';
            emptyState.style.display = 'none';

            database.ref('leads').on('value', snapshot => {
                loadingMsg.style.display = 'none';
                leadsData = [];

                snapshot.forEach(childSnapshot => {
                    const lead = {
                        id: childSnapshot.key,
                        ...childSnapshot.val()
                    };
                    leadsData.push(lead);
                });

                // Ordenar por fecha descendente
                leadsData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                filteredLeads = [...leadsData];
                actualizarEstadisticas();
                renderizarTabla();
            });
        }

        function actualizarEstadisticas() {
            const total = leadsData.length;
            const pendientes = leadsData.filter(l => l.estado === 'Pendiente').length;
            const contactados = leadsData.filter(l => l.estado === 'Contactado').length;
            const convertidos = leadsData.filter(l => l.estado === 'Convertido').length;

            document.getElementById('totalLeads').textContent = total;
            document.getElementById('pendientesLeads').textContent = pendientes;
            document.getElementById('contactadosLeads').textContent = contactados;
            document.getElementById('convertidosLeads').textContent = convertidos;
        }

        function renderizarTabla() {
            const tbody = document.getElementById('leadsTableBody');
            const table = document.getElementById('leadsTable');
            const emptyState = document.getElementById('emptyState');

            tbody.innerHTML = '';

            if (filteredLeads.length === 0) {
                table.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            table.style.display = 'table';
            emptyState.style.display = 'none';

            filteredLeads.forEach(lead => {
                const fecha = new Date(lead.timestamp).toLocaleDateString('es-CL');
                const badgeClass = lead.estado.toLowerCase().replace(' ', '-');

                const row = `
                    <tr>
                        <td>${lead.nombre}</td>
                        <td>${lead.email}</td>
                        <td>${lead.telefono || '-'}</td>
                        <td>${lead.interes}</td>
                        <td>${lead.fechaFormato || fecha}</td>
                        <td><span class="badge ${badgeClass}">${lead.estado}</span></td>
                        <td>
                            <div class="actions">
                                <button class="contact-btn" onclick="abrirModalContacto('${lead.nombre}', '${lead.email}', '${lead.telefono}', '${lead.interes}')">Contactar</button>
                                <select class="status-select" onchange="cambiarEstado('${lead.id}', this.value)">
                                    <option value="">Cambiar estado</option>
                                    <option value="Pendiente">Pendiente</option>
                                    <option value="Contactado">Contactado</option>
                                    <option value="Convertido">Convertido</option>
                                    <option value="No interesado">No interesado</option>
                                </select>
                                <button class="delete-btn" onclick="eliminarLead('${lead.id}')">Eliminar</button>
                            </div>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function cambiarEstado(leadId, nuevoEstado) {
            if (nuevoEstado) {
                database.ref(`leads/${leadId}/estado`).set(nuevoEstado);
            }
        }

        function eliminarLead(leadId) {
            if (confirm('¿Estás seguro de que quieres eliminar este lead?')) {
                database.ref(`leads/${leadId}`).remove();
            }
        }

        // Búsqueda en tiempo real
        document.getElementById('searchBox').addEventListener('input', e => {
            const query = e.target.value.toLowerCase();
            filteredLeads = leadsData.filter(lead =>
                lead.nombre.toLowerCase().includes(query) ||
                lead.email.toLowerCase().includes(query)
            );
            renderizarTabla();
        });

        // Exportar a CSV
        function exportarCSV() {
            if (leadsData.length === 0) {
                alert('No hay leads para exportar');
                return;
            }

            let csv = 'Nombre,Email,Teléfono,Interés,Fecha,Estado\n';
            leadsData.forEach(lead => {
                csv += `"${lead.nombre}","${lead.email}","${lead.telefono}","${lead.interes}","${lead.fechaFormato}","${lead.estado}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `leads-glow-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }

        // Modal de contacto
        function abrirModalContacto(nombre, email, telefono, interes) {
            document.getElementById('modalContactoNombre').textContent = `Contactar a ${nombre}`;
            document.getElementById('modalContactoEmail').textContent = email;

            // Email
            document.getElementById('btnEmail').href = `mailto:${email}`;

            // Teléfono
            document.getElementById('btnTelefono').href = `tel:${telefono}`;

            // WhatsApp
            const mensajeWA = encodeURIComponent(`Hola ${nombre}, te escribo desde GLOW por tu interés en ${interes}.`);
            document.getElementById('btnWhatsapp').href = `https://wa.me/${telefono.replace(/\D/g, '')}?text=${mensajeWA}`;

            document.getElementById('contactModal').style.display = 'flex';
        }

        function cerrarModalContacto() {
            document.getElementById('contactModal').style.display = 'none';
        }

        window.addEventListener('click', function(event) {
            const modal = document.getElementById('contactModal');
            if (event.target === modal) {
                cerrarModalContacto();
            }
        });
    </script>
</body>
</html>
